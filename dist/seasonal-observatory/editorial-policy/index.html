      <p>节气观察室的内容选择、来源核验和更新原则。</p>
    </div>
    <div class="plain-body"><p>每篇文章必须明确节气对象、观察场景、资料来源、编辑方式和最近复核日期。基础历法知识优先参考公开机构资料，生活观察部分由编辑部原创整理。</p><p>本站避免无来源的民俗断言、未经验证的健康建议和拼贴式百科改写。读者投稿必须获得授权，并在页面中说明处理方式。</p><p>如果页面内容过短、来源不清或只有泛泛口号，会退回补写，不进入正式扩量队列。</p></div>
