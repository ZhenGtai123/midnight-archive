      </div>
      <div class="plain-body"><p>每篇故事必须具备明确来源、作者或传统归属、年代说明、处理方式和最近复核日期。没有来源的故事不进入正式发布队列。</p><p>我们优先发布有导读价值的页面：能解释文本背景、主题、版本差异或现代阅读意义，而不是简单复制原文。页面如被发现过薄，会退回补写或下线。</p><p>现代网络故事必须获得授权。未经许可的论坛、博客、社交媒体和付费内容不会整篇转载。</p></div>
